# foot config — converted from kitty
# See man foot.ini for full reference

[main]
font=Source Code Pro:size=10
pad=2x2

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

[colors-dark]
foreground=ffffff
background=000000
alpha=0.7
cursor=cccccc 111111

# 16 terminal colors
regular0=000000  # black
regular1=cc0403  # red
regular2=19cb00  # green
regular3=cecb00  # yellow
regular4=0d73cc  # blue
regular5=cb1ed1  # magenta
regular6=0dcdcd  # cyan
regular7=dddddd  # white

bright0=767676   # bright black
bright1=f2201f   # bright red
bright2=23fd00   # bright green
bright3=fffd00   # bright yellow
bright4=1a8fff   # bright blue
bright5=fd28ff   # bright magenta
bright6=14ffff   # bright cyan
bright7=ffffff   # bright white

selection-foreground=000000
selection-background=fffacd

urls=0087bd

[scrollback]
lines=2000
multiplier=5.0

[bell]
urgent=yes
notify=no
visual=no

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
primary-paste=Control+Shift+s
scrollback-up-line=Control+Shift+k
scrollback-down-line=Control+Shift+j
scrollback-up-page=Control+Shift+Page_Up
scrollback-down-page=Control+Shift+Page_Down
scrollback-home=Control+Shift+Home
scrollback-end=Control+Shift+End
font-increase=Control+Shift+equal
font-decrease=Control+Shift+minus
font-reset=Control+Shift+BackSpace
fullscreen=Control+Shift+F11
spawn-terminal=Control+Shift+n
